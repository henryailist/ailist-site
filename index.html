<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI List</title>
  <meta name="description" content="AI List is an early-stage venture capital firm.">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    main {
      width: 100%;
      max-width: 760px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(52px, 9vw, 82px);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    p {
      max-width: 650px;
      margin: 0 0 18px;
      font-size: 20px;
      line-height: 1.6;
      color: #444444;
    }

    footer {
      margin-top: 64px;
      font-size: 14px;
      color: #888888;
    }
  </style>
</head>

<body>
  <main>
    <h1>AI List</h1>

    <p>
      AI List is an early-stage venture capital firm focused on
      artificial intelligence and emerging technologies.
    </p>

    <footer>
      © 2026 AI List. All rights reserved.
    </footer>
  </main>
</body>
</html>
